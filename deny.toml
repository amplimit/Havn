# cargo-deny configuration. https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = true

[advisories]
yanked = "warn"
ignore = [
    # paste is unmaintained but has no replacement; transitive dep via rmcp.
    "RUSTSEC-2024-0436",
    # proc-macro-error2 is unmaintained with no safe upgrade (RUSTSEC-2026-0173);
    # pulled in transitively via age -> i18n-embed-fl. Re-evaluate when age drops it.
    "RUSTSEC-2026-0173",
]

[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "0BSD",
    "NCSA",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
