name: smoke

# Spec §12.1: ≤ 10-minute "install → first-chat-ready" SLO. Runs the full
# install.sh + agent-spawn + WS-upgrade path on a fresh Ubuntu 24.04 image
# and asserts the wall clock stays under the SLO ceiling.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  install-and-first-chat:
    name: install → first-chat-ready
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      # The runner already has a stable Rust toolchain via dtolnay/rust-toolchain;
      # install.sh skips its own rustup step when HAVN_SKIP_RUSTUP=1.
      - uses: dtolnay/rust-toolchain@stable

      # Cache the cargo registry + git index + target/ so re-runs measure the
      # incremental build path (which is what the production SLO targets:
      # operators don't repeatedly download Rust). Cold runs still have to
      # finish under the SLO; the timeout-minutes guard above enforces it.
      - uses: Swatinem/rust-cache@v2

      - name: install jq
        run: sudo apt-get update -qq && sudo apt-get install -y jq

      - name: run smoke test
        run: ./scripts/smoke.sh
        env:
          # Use a debug build for CI — install.sh defaults to release, which
          # in cold-cache CI has historically pushed against the SLO ceiling.
          # Production keeps release.
          HAVN_PROFILE: debug
          HAVN_SKIP_RUSTUP: '1'
          # CI runners aren't root; skip the system-user creation.
          HAVN_SKIP_USER: '1'
          # GitHub-hosted runners disable unprivileged user namespaces, which
          # would otherwise make NamespaceSpawner fail at spawn time. Force
          # the subprocess fallback so the smoke validates the install path
          # rather than the kernel-isolation primitives (those are covered
          # by spawner unit tests and a separate `cargo test` job).
          HAVN_SPAWNER: subprocess

      - name: upload gateway log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gateway-log
          path: ${{ runner.temp }}/havn-gateway.log
          if-no-files-found: ignore
