name: release

# Builds statically-linked (musl) binaries and publishes them to a GitHub
# Release. install.sh downloads these so operators get a single-file install
# with no Rust toolchain and no compile step (spec §12.1).
#
# Trigger: push a tag like `v0.1.0`. `workflow_dispatch` runs the build for
# testing (and, if given a `tag` input, uploads to that release).

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to upload to (leave blank to only build artifacts)'
        required: false
        default: ''

permissions:
  contents: write   # create releases + upload assets

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
          - target: aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4

      - name: install pinned toolchain + musl target
        # rust-toolchain.toml pins the channel (1.94.0). `rustup target add`
        # runs against that pinned toolchain — not `stable` — so the musl std
        # lands where the build actually uses it. (Adding the target to
        # `stable` instead is why an earlier run failed with E0463 "can't find
        # crate for core".)
        run: |
          rustup show
          rustup target add ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: install zig + cargo-zigbuild
        # zig provides the cross C compiler/linker for the bundled C deps
        # (sqlite, aws-lc) across both musl targets — one mechanism, no
        # per-arch system toolchain, and it cross-compiles aarch64 from the
        # x86_64 runner.
        run: |
          curl -fsSL https://ziglang.org/download/0.13.0/zig-linux-x86_64-0.13.0.tar.xz \
            | sudo tar -xJ -C /opt
          echo "/opt/zig-linux-x86_64-0.13.0" >> "$GITHUB_PATH"
          cargo install --locked cargo-zigbuild

      - name: build static binaries
        run: cargo zigbuild --release --target ${{ matrix.target }} --bins

      - name: verify the binary is fully static
        run: |
          bin="target/${{ matrix.target }}/release/havn-gateway"
          file "$bin"
          # `file` reads the ELF header, so it works for a cross-arch binary
          # where `ldd` can't run. A static build reports "statically linked".
          file "$bin" | grep -q "statically linked" \
            || { echo "::error::$bin is not statically linked"; exit 1; }
          echo "ok: static"

      - name: package
        id: pkg
        run: |
          triple="${{ matrix.target }}"
          asset="havn-${triple}.tar.gz"
          mkdir -p dist
          tar -czf "dist/${asset}" \
            -C "target/${triple}/release" \
            havn havn-gateway havn-runtime havn-init
          ( cd dist && sha256sum "${asset}" > "${asset}.sha256" )
          echo "asset=${asset}" >> "$GITHUB_OUTPUT"
          ls -lh dist

      - name: upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pkg.outputs.asset }}
          path: dist/*
          if-no-files-found: error

      - name: publish to release
        # Only when a tag is in play: a `v*` tag push, or a manual run that
        # supplied a tag input.
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.tag != '' && github.event.inputs.tag || github.ref_name }}
        run: |
          # Create the release if it doesn't exist yet; ignore the "already
          # exists" error so parallel matrix jobs don't fight. --clobber lets
          # re-runs replace assets.
          gh release create "$TAG" --title "$TAG" --generate-notes \
            || echo "release $TAG already exists; uploading assets"
          gh release upload "$TAG" dist/* --clobber
